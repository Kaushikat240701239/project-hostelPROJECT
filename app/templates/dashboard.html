{% extends "base.html" %}

{% block title %}Dashboard - Hostel Complaint System{% endblock %}

{% block content %}
<div class="top-bar">
    <div class="d-flex align-items-center">
        <h4 class="m-0"><i class="fa-solid fa-hotel me-2"></i> HCMTS</h4>
    </div>
    <div class="d-flex align-items-center">
        <div class="dropdown me-3">
            <button class="btn btn-link text-white position-relative" type="button" data-bs-toggle="dropdown">
                <i class="fa-solid fa-bell"></i>
                <span id="notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
            </button>
            <ul id="notif-list" class="dropdown-menu dropdown-menu-end glass-card" style="width: 300px; max-height: 400px; overflow-y: auto;">
                <li><h6 class="dropdown-header">Notifications</h6></li>
                <li><hr class="dropdown-divider"></li>
                <!-- Notifications loaded via JS -->
            </ul>
        </div>
        <div class="me-3">
            <span class="badge bg-info p-2" id="user-role-badge"></span>
            <span class="text-white ms-2" id="username-display"></span>
        </div>
        <button class="btn btn-sm btn-outline-light" onclick="handleLogout()">Logout</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <!-- Links populated by JS based on role -->
</div>

<div class="main-content" id="main-content">
    <div class="container-fluid">
        <div id="dashboard-greeting" class="mb-4 animate-fade mt-2"></div>
        <!-- GLOBAL DASHBOARD STATS -->
        <div class="row mb-4" id="stats-container">
            <!-- Stats cards populated by JS -->
        </div>

        <div class="row mb-4" id="charts-row" style="display: none;">
            <div class="col-md-6 mb-3">
                <div class="glass-card animate-fade h-100">
                    <h5>Complaint Status Distribution</h5>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="glass-card animate-fade h-100">
                    <h5>Priority Analysis</h5>
                    <canvas id="priorityChart"></canvas>
                </div>
            </div>
        </div>

        <!-- ROLE SPECIFIC CONTENT -->
        <div id="role-content" class="animate-fade">
            <!-- Dynamically injected content -->
        </div>
    </div>
</div>

<!-- COMPLAINT MODAL (for Student/Warden interactions) -->
<div class="modal fade" id="complaintModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content glass-card" style="background: white;">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="modalTitle">Complaint Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Data populated by JS -->
            </div>
        </div>
    </div>
</div>

<!-- REJECT MODAL -->
<div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content glass-card" style="background: white;">
            <div class="modal-header border-0">
                <h5 class="modal-title">Reject Complaint</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Priority Level</label>
                    <select id="reject-priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Reason for Rejection</label>
                    <textarea id="reject-reason" class="form-control" rows="3" placeholder="Enter reason..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmRejectBtn">Confirm Reject</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
